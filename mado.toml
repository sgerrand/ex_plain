[lint]
respect-ignore = true
respect-gitignore = true
output-format = "concise"
quiet = false
# respect-gitignore skips _build/, deps/, cover/, doc/, tmp/ and .claude/.
# CHANGELOG.md is tracked but generated by release-please, so exclude it: it
# repeats section names (## Added, ## Fixed) across versions. MD013 (line
# length) and MD024 (duplicate headings) are also omitted from the rules list
# below — badge URLs and long code examples exceed 80 chars.
exclude = ["**/CHANGELOG.md"]
rules = [
  "MD001",
  "MD002",
  "MD003",
  "MD004",
  "MD005",
  "MD006",
  "MD007",
  "MD009",
  "MD010",
  "MD012",
  "MD014",
  "MD018",
  "MD019",
  "MD020",
  "MD021",
  "MD022",
  "MD023",
  "MD025",
  "MD026",
  "MD027",
  "MD028",
  "MD029",
  "MD030",
  "MD031",
  "MD032",
  "MD033",
  "MD034",
  "MD035",
  "MD036",
  "MD037",
  "MD038",
  "MD039",
  "MD040",
  "MD041",
  "MD046",
  "MD047",
]

[lint.md002]
level = 1

[lint.md003]
style = "consistent"

[lint.md004]
style = "consistent"

[lint.md007]
indent = 4

[lint.md025]
level = 1

[lint.md026]
punctuation = ".,;:!?"

[lint.md029]
style = "one"

[lint.md030]
ul-single = 1
ol-single = 1
ul-multi = 1
ol-multi = 1

[lint.md033]
allowed-elements = []

[lint.md035]
style = "consistent"

[lint.md036]
punctuation = ".,;:!?"

[lint.md041]
level = 1

[lint.md046]
style = "fenced"
